file_info:
    - description: >
        This file contains the key entities that define and describe how
        iacs works.
    - file_info

component:
    data:
        - description: >
            Fundamental component type used throughout the iacs system.
            Children of ((component)) are themselves component definitions.
    tag:
        - alias: tag
        - description: >
            A tag has no data. It simply indicates that the entity owns a component
            of a given type.
    value:
        - alias: value
        - description: >
            A component that is a single value of arbitrary type.
        - field:
            value: value
            description: The value itself.
    relation:
        data:
            - alias: relation
            - description: >
                A component that describes a relation between two entities: the owner
                entity and the entity specified by value.
            - field:
                value:
                    description: The other end of the relation.
                    type: entity_ref
        directed_relation:
            data:
                - alias: directed_relation
                - description: >
                    A relation where direction matters. The owner entity is the source
                    and the entity specified by value is the target.
            parent:
                - description: The target entity is the parent of the source entity.

base_data_type:
    data:
        - description: >
            A ((data_type)) component is a ((value)) component with additional
            specifications.
        - parent: value
    int:
        - alias: int
        - description: Integer data type.
    float:
        - alias: float
        - description: Float data type.
    str:
        data:
            - alias: str
            - description: String data type.
        entity_id:
            - alias: entity_id
            - description: Data type for entity IDs.
        component_type:
            - alias: component_type
            - description: >
                The component_type data type means the value must point to
                an entity with a [component_definition] component.
        categorical:
            - alias: categorical
            - description: Data type for a limited set of categories.
            - todo: Is this redundant with [field.range]?
        entity_ref:
            - alias: entity_ref
            - description: >
                A user-provided string that references an entity by providing a
                partial or full path. Resolved to an entity_id by substring
                matching against the entity's full path.
    timestamp:
        - description: Timestamp data type.
        - field:
            value: value
            description: The value of the timestamp as a string, float, or int.
        - field:
            value: timezone
            description: The timezone.
            type: str
            default: UTC
        - field:
            value: format
            description: How to interpret the value.
            type: str
            default: str
            range: [str, epoch_time]
    timedelta:
        - description: >
            Data type for differences in time. I
        - field:
            value:
                description: >
                    The value of the timedelta as a string, float, or int. If a string
                    such as "2 days" then the timedelta is unresolved, and must be
                    converted prior to usage in calculations.
            unit:
                description: Unit for the timedelta.
                type: str

data_structure:
    data:
        - parent: value
    list:
        - description: List data type.
    dict:
        - description: Dictionary data type.
    field:
        - description: >
            A component that specifies the constraints on a data field. Used to define
            the schema for components.
        - parent: dict
        - field:
            value: value
            description: The name of the field.
            type: str
        - field:
            value: description
            description: A text description of the field.
            type: str
        - field:
            value: type
            description: The type of the field.
            type: str
        - field:
            value: nullable
            description: Whether or not nulls can exist in the field.
            type: bool
            default: true
        - field:
            value: unique
            description: Whether or not there should be only unique values.
            type: bool
            default: false
        - field:
            value: default
            description: The default value for the field.
        - field:
            value: range
            description: >
                A data structure specifying the allowed values for the field. If a
                list, then the type should be categorical or a child of that type.
        - todo: >
            Should we use "domain" instead of "range"? Is there a better other term?
    schema:
        - description: >
            A list of ((field)) components that defines the columns in a component
            table.
        - parent: list
        - field:
            value: value
            description: A list of ((field)) components.
            type: list[field]
    table:
        - description: >
            Tabular data type. From a row-first perspective tables are lists of
            dictionaries of fields. From a column-first perspective tables are
            dictionaries of lists of fields.
        - parent: dict
        - field:
            value: value
            description: The data itself.
        - field:
            value: schema
            description: The ordered fields for the table columns.
            type: schema

iacs_component:
    data:
        - description: Additional useful components defined by iacs.
        - parent: value

    description:
        - description: >
            A human-readable description of what an entity is or does. This is one of
            the most common components as nearly every entity should have a description.
        - parent: value
        - field:
            value: value
            description: The descriptive text.
            type: str

    entity_id:
        - description: >
            The ((entity_id)) component contains identity information about a given
            entity.
        - parent: value
        - field:
            value: value
            description: >
                The entity_id.
            type: str
        - todo: Determine how we want to calculate the entity_id.
        - field:
            value: path
            description: >
                The full path to the entity, in the format {filepath}:{yaml_path}.
            type: str
        - field:
            value: hash
            description: >
                Hash of the path, used for ID when brief.
                TODO: Do we actually need this? It was supposed to be a readable
                version of the path, but it's far from readable.
            type: str
        - field:
            value: alias
            description: >
                A readable version of the entity_id.
            type: str
    requirement:
        - description: >
            Indicates that an entity represents a requirement that must be satisfied
            by the system design. Requirements should be traced to implementations.
        - parent: value
        - field:
            value:
                description: The type of requirement.
                type: str
                range:
                    - functional
                    - quality
                    - constraint
                default: functional
            priority:
                description: >
                    The priority, with higher values corresponding to higher priority.
                type: float
                default: 0.5
                range: [0, 1]
            schedule:
                description: >
                    How often the requirement needs to be satisfied. If null, the
                    requirement needs to be satisfied on demand.
                type: timedelta
                default: null

    solution:
        - description: >
            A solution relation is used to show a requirement is fulfilled.
            The ((solution.source)) solves the ((solution)).requirement.
        - parent: directed_relation
        - field:
            value: target
            description: The entity that this solution targets (what is being solved).
            type: entity_ref

    effort:
        - description: >
            Used to quantify the amount of human work for a solution to function.
        - parent: value
        - field:
            value:
                description: Quantification of work required.
                type: float
            unit:
                description: >
                    Units for the quantifications. Points refers to story points.
                type: str
                range: [points, hours]
                default: points
                nullable: false
            schedule:
                description: >
                    How often the effort needs to be put in, i.e. the maintenance
                    effort. When not provided, assumes a one-time effort (setup effort).
                type: timedelta
                default: null

    task:
        - description: >
            Indicates that an entity represents a task that needs to be completed,
            either by a human or by automated infrastructure.
            To create a repeatable task to execute, create an entity that
            inherits from ((task)).
            To create an instance of a task, including start time, execution_state,
            etc., add a component instance of ((task)) to an entity.
        - parent: value
        - field:
            value: start
            description: Time the task was started at.
            type: timestamp
        - field:
            value: end
            description: Time the task ended.
            type: timestamp
        - field:
            value: execution_state
            description: State of the task in execution.
            default: not started
            type: str
            range:
                - not started
                - in progress
                - complete
        - field:
            value: result_state
            description: Outcome state of the task.
            type: str
            range:
                - success
                - failure
                - interrupted
        - field:
            value: executor
            description: The entity responsible for executing the task.
            type: entity_id

    work_state:
        - description: >
            The status of an entity, in terms of implementation.
        - parent: value
        - field:
            value: value
            description: A string indicating the status of the entity.
            type: str
            range:
                - new
                - in progress
                - in review
                - blocked
                - done
                - removed
            nullable: false

    todo:
        - description: >
            Indicates something about the entity that needs to be addressed or completed.
            Used to track pending work items.
        - parent: value
        - field:
            value: value
            description: Description of what needs to be done.
            type: str
        - field:
            value: priority
            description: >
                The priority, with higher values corresponding to higher priority.
            type: float
            default: 0.5
            range: [0, 1]