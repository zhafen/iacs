file_info:
    - description: >
        This file contains the key entities that define and describe how
        iacs works.
    - file_info

component:
    data:
        - description: >
            Fundamental component type used throughout the iacs system.
            Children of ((component)) are themselves component definitions.
    tag:
        - id: tag
        - description: >
            A tag has no data. It simply indicates that the entity owns a component
            of a given type.
    value:
        - id: value
        - description: >
            A component that is a single value of arbitrary type.
        - field:
            value: value
            description: The value itself.
    relation:
        data:
            - id: relation
            - description: >
                A component that describes a relation between two entities. Which is
                ((relation.source)) and which is ((relation.value)) is arbitrary.
            - field:
                value: source
                description: An entity related to the target entity.
            - field:
                value: target
                description: An entity related to the source entity.
        directed_relation:
            data:
                - id: directed_relation
                - description: A relation where direction matters.
                - schema:
                    source: The originating entity.
                    target: The target entity.
            parent:
                - description: The target entity is the parent of the source entity.

base_data_type:
    data:
        - description: >
            A ((data_type)) component is a ((value)) component with additional
            specifications.
        - parent: value
    int:
        - id: int
        - description: Integer data type.
    float:
        - id: float
        - description: Float data type.
    str:
        data:
            - id: str
            - description: String data type.
        component_type:
            - id: component_type
            - description: >
                The component_type data type means the value must point to
                an entity with a [component_definition] component.
        categorical:
            - id: categorical
            - description: Data type for a limited set of categories.
            - todo: Is this redundant with [field.range]?
    timestamp:
        - id: categorical
        - description: Timestamp data type.
        - field:
            value: value
            description: The value of the timestamp as a string, float, or int.
        - field:
            value: timezone
            description: The timezone.
            type: str
            default: UTC
        - field:
            value: format
            description: How to interpret the value.
            type: str
            default: str
            range: [str, epoch_time]

data_structure:
    data:
        - parent: value
    list:
        - description: List data type.
    dict:
        - description: Dictionary data type.
    field:
        - description: >
            A component that specifies the constraints on a data field. Used to define
            the schema for components.
        - parent: dict
        - field:
            value: value
            description: The name of the field.
            type: str
        - field:
            value: description
            description: A text description of the field.
            type: str
        - field:
            value: type
            description: The type of the field.
            type: str
        - field:
            value: nullable
            description: Whether or not nulls can exist in the field.
            type: bool
            default: true
        - field:
            value: unique
            description: Whether or not there should be only unique values.
            type: bool
            default: false
        - field:
            value: default
            description: The default value for the field.
        - field:
            value: range
            description: >
                A data structure specifying the allowed values for the field. If a
                list, then the type should be categorical or a child of that type.
        - todo: >
            Should we use "domain" instead of "range"? Is there a better other term?
    schema:
        - description: >
            A list of ((field)) components that defines the columns in a component
            table.
        - parent: list
        - field:
            value: value
            description: A list of ((field)) components.
            type: list[field]
    table:
        - description: >
            Tabular data type. From a row-first perspective tables are lists of
            dictionaries of fields. From a column-first perspective tables are
            dictionaries of lists of fields.
        - parent: dict
        - field:
            value: value
            description: The data itself.
        - field:
            value: schema
            description: The ordered fields for the table columns.
            type: schema

iacs_component:
    data:
        - description: Additional useful components defined by iacs.
        - parent: value

    description:
        - description: >
            A human-readable description of what an entity is or does. This is one of
            the most common components as nearly every entity should have a description.
        - parent: value
        - field:
            value: value
            description: The descriptive text.
            type: str

    requirement:
        - description: >
            Indicates that an entity represents a requirement that must be satisfied
            by the system design. Requirements should be traced to implementations.
        - parent: value
        - field:
            value: value
            description: The type of requirement.
            type: str
            range:
                - functional
                - quality
                - constraint
        - field:
            value: priority
            description: >
                The priority, with higher values corresponding to higher priority.
            type: float
            default: 0.5
            range: [0, 1]

    solution:
        - description: >
            A solution relation is used to show a requirement is fulfilled.
            The ((solution.source)) solves the ((solution)).requirement.
        - parent: directed_relation

    task:
        - description: >
            Indicates that an entity represents a task that needs to be completed,
            either by a human or by automated infrastructure.
        - parent: tag

    todo:
        - description: >
            Indicates something about the entity that needs to be addressed or completed.
            Used to track pending work items.
        - parent: value
        - field:
            value: value
            description: Description of what needs to be done.
            type: str
        - field:
            value: priority
            description: >
                The priority, with higher values corresponding to higher priority.
            type: float
            default: 0.5
            range: [0, 1]