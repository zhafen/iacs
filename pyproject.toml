[project]
name = "iacs"
version = "0.1.0"
description = "Infrastructure as Code Sketch"
requires-python = ">=3.8"
dependencies = [
    "duckdb>=1.3.2",
    "flask>=3.0.0",
    "ibis-framework[duckdb]>=2.0.0",
    "pandas>=2.0.0",
    "pyyaml>=6.0",
    "sf-hamilton>=1.88.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[tool.setuptools]
py-modules = ["app"]
packages = ["iacs"]
