<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Requirements Tree</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 10px 18px;
      background: #181825;
      border-bottom: 1px solid #313244;
      font-size: 14px;
      color: #89b4fa;
      flex-shrink: 0;
    }

    header span {
      color: #6c7086;
      font-size: 12px;
      margin-left: 12px;
    }

    #canvas {
      flex: 1;
      overflow: hidden;
      cursor: grab;
    }

    #canvas:active { cursor: grabbing; }

    .node circle {
      stroke-width: 2px;
      transition: fill 0.15s;
    }

    .node text {
      font-size: 12px;
      fill: #cdd6f4;
      pointer-events: none;
    }

    .link {
      fill: none;
      stroke: #45475a;
    }
  </style>
</head>
<body>
  <header>
    Requirements Tree
    <span>click a node to expand / collapse &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; drag to pan</span>
  </header>
  <svg id="canvas"></svg>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    let NODE_W = 210;     // horizontal spacing per depth level (recalculated after load)
    const NODE_H = 18;    // vertical spacing between nodes

    const svg = d3.select("#canvas");
    const g = svg.append("g");

    // Pan + zoom — store a single instance so the handler is never replaced
    const zoom = d3.zoom().scaleExtent([0.1, 3]).on("zoom", e => g.attr("transform", e.transform));
    svg.call(zoom);

    let nodeId = 0;

    // Measure text width using an offscreen canvas
    const _ctx = document.createElement("canvas").getContext("2d");
    _ctx.font = "12px sans-serif";
    function textWidth(str) { return _ctx.measureText(str).width; }

    const params = new URLSearchParams(window.location.search);
    const key = params.get("ancestor_key") || "";
    const url = "/api/tree" + (key ? "?ancestor_key=" + encodeURIComponent(key) : "");
    d3.json(url).then(data => {
      const root = d3.hierarchy(data);
      root.x0 = 0;
      root.y0 = 0;

      // Set NODE_W from the longest label across all nodes, plus circle + padding
      let maxW = 0;
      root.each(d => {
        const label = d.data.name + (d.data.priority != null ? ` (${d.data.priority.toFixed(2)})` : "");
        maxW = Math.max(maxW, textWidth(label));
      });
      NODE_W = maxW + 40;

      // Collapse everything below the first level
      root.children && root.children.forEach(collapse);
      update(root);

      // After initial render, centre the root node in view
      const { width, height } = svg.node().getBoundingClientRect();
      svg.call(zoom.transform, d3.zoomIdentity.translate(80, height / 2));
    });

    function collapse(d) {
      if (d.children) {
        d._children = d.children;
        d._children.forEach(collapse);
        d.children = null;
      }
    }

    function update(source) {
      const { width, height } = svg.node().getBoundingClientRect();
      const treeFn = d3.tree().nodeSize([NODE_H, NODE_W]);
      treeFn(root_ref(source));

      const nodes = root_ref(source).descendants();
      const links  = root_ref(source).links();

      // ── Nodes ──────────────────────────────────────────────
      const node = g.selectAll("g.node").data(nodes, d => d.uid || (d.uid = ++nodeId));

      const enter = node.enter().append("g")
        .attr("class", "node")
        .attr("transform", `translate(${source.y0},${source.x0})`)
        .style("cursor", "pointer")
        .on("click", (_, d) => {
          if (d.children) { d._children = d.children; d.children = null; }
          else             { d.children = d._children; d._children = null; }
          update(d);
        });

      enter.append("circle").attr("r", 0)
        .style("stroke", "#89b4fa")
        .style("fill", d => d._children ? "#89b4fa" : "#1e1e2e");

      const textEl = enter.append("text")
        .attr("dy", "0.35em")
        .attr("x", d => d.children || d._children ? -10 : 10)
        .attr("text-anchor", d => d.children || d._children ? "end" : "start");
      textEl.append("tspan").text(d => d.data.name);
      textEl.append("tspan")
        .attr("fill", "#6c7086")
        .attr("font-size", "10px")
        .text(d => d.data.priority != null ? ` (${d.data.priority.toFixed(2)})` : "");

      const merged = enter.merge(node);

      merged.transition().duration(220)
        .attr("transform", d => `translate(${d.y},${d.x})`);

      merged.select("circle").transition().duration(220)
        .attr("r", 5)
        .style("fill", d => d._children ? "#89b4fa" : "#1e1e2e");

      merged.select("text")
        .attr("x", d => d.children || d._children ? -10 : 10)
        .attr("text-anchor", d => d.children || d._children ? "end" : "start");

      node.exit().transition().duration(220)
        .attr("transform", `translate(${source.y},${source.x})`)
        .remove()
        .select("circle").attr("r", 0);

      // ── Links ──────────────────────────────────────────────
      const link = g.selectAll("path.link").data(links, d => d.target.uid);

      const diagonal = d3.linkHorizontal().x(d => d.y).y(d => d.x);
      const collapsed = { x: source.x0, y: source.y0 };

      link.enter().insert("path", "g")
        .attr("class", "link")
        .style("stroke-width", d => `${Math.max(0.5, d.target.data.priority * 4)}px`)
        .attr("d", () => diagonal({ source: collapsed, target: collapsed }))
        .merge(link).transition().duration(220)
        .style("stroke-width", d => `${Math.max(0.5, d.target.data.priority * 4)}px`)
        .attr("d", diagonal);

      link.exit().transition().duration(220)
        .attr("d", () => diagonal({ source: { x: source.x, y: source.y }, target: { x: source.x, y: source.y } }))
        .remove();

      // Stash positions for next transition
      nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
    }

    // Helper: walk up to the root (needed because D3 hierarchy root isn't in closure scope)
    function root_ref(node) {
      let n = node;
      while (n.parent) n = n.parent;
      return n;
    }
  </script>
</body>
</html>
