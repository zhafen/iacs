entity_first_yaml_format:
    data:
        - description: >
              The entity-first YAML format is the human-authored input format for iacs.
              It organizes data around entities, with each entity defined by a set of
              component instances. This format is optimized for human readability and
              ease of manual authoring.

    format_rules:
        - description: |
              Summary of the entity-first format. See sub-entities for the full
              specification.

              ## Entity structure

              Entities are YAML keys. An entity's value is one of:

              FLAT entity (list value) — own components only:
                  entity_name:
                      - component_item_1
                      - component_item_2

              NESTED entity (dict value) — owns sub-entities:
                  entity_name:
                      sub_entity:
                          - component_item
                      data:                # "data" key holds the parent's own components
                          - component_item

              Nested entity IDs follow the pattern "parent.child".

              ## Component item forms

              Bare string — tag component with no value:
                  - system

              Scalar mapping — sets the "value" field of the component:
                  - description: Some text here
                  - status: in progress

              Structured mapping — sets named sub-fields:
                  - requirement:
                        value: 0.9
                        type: functional

              ## The "of" directed-relation syntax

              For directed_relation components the "of" form flips source and target.
              Writing "solution of" (note the space) means this entity solves the
              referenced requirement. The value is a dot-separated entity path resolved
              by substring matching:
                  - solution of: my_requirement.sub_requirement

              ## Multiple component instances

              An entity may have multiple instances of the same component type.
              Each list entry is a separate instance (distinguished by component_index):
                  - effort:
                        value: 8
                  - effort:
                        value: 2
                        schedule: weekly

    canonical_example:
        - description: |
              ```yaml
              make_cats_happy:
                  data:
                      - description: The mission of our cat-happiness device.
                      - requirement:
                            value: 1
                  feed_cats:
                      - requirement:
                            value: 0.9
                      - alias: feed_cats
                  sift_cat_box:
                      - description: Unfortunately.
                      - requirement:
                            value: 0.8

              cat_happiness_device:
                  data:
                      - description: An all-in-one tool to make cats happy.
                      - solution of: make_cats_happy
                      - system
                  feeding_system:
                      - description: The task to feed the cats.
                      - solution of: make_cats_happy.feed_cats
                      - effort:
                            value: 8
                      - effort:
                            value: 2
                            schedule: weekly
                  cleaning_system:
                      - solution of: make_cats_happy.sift_cat_box
              ```

    entity_item:
        data:
            - description: >
                  Entity-centered data is a dictionary where each ((entity_item))
                  is an ((entity_key)), ((entity_value)) pair.
            - requirement: {type: constraint}
        entity_key:
            top_level_entity_key:
                - description: >
                      If an ((entity_item)) is not nested, then the ((entity_key))
                      is equivalent to the ((entity_id)).
                - requirement: {type: constraint}
            nested_entity_key:
                - description: >
                      If an ((entity_item)) is nested, then the ((entity_id))
                      is "{parent_entity_id}.{entity_key}".
                - requirement: {type: constraint}
        entity_value:
            data:
                - description: >
                      Each ((entity_value)) is either a list of components or
                      a dictionary of entities.
                - requirement: {type: constraint}
            components_list:
                data:
                    - description: >
                          An ((entity_value)) can be a list of
                          ((component_item))s.
                    - requirement: {type: constraint}
                component_index:
                    - description: >
                          Each ((component_item)) can be uniquely identified by
                          the ((entity_id)) in addition to the ((component_index))
                          in the components list. This allows an entity to have
                          multiple components of the same type.
                    - requirement: {type: constraint}
            child_entities_dictionary:
                data:
                    - description: >
                          An ((entity_value)) can be a dictionary where each item
                          is itself an ((entity_item)).
                    - requirement: {type: constraint}
                parent_entity_components_list:
                    - description: >
                          If an ((entity_value)) is a
                          ((child_entities_dictionary)) then the item with the key
                          "data" is a special item reserved to hold the
                          ((components_list)) for the entity.
                    - requirement: {type: constraint}

    component_item:
        data:
            - description: >
                  The data for component instances is stored in
                  ((component_item))s. The format of the ((component_item))
                  contains information about what it is.
            - requirement: {type: constraint}
        string_component_item:
            - description: >
                  When the ((component_item)) is a string then the value of the
                  string is the ((component_type)).
            - requirement: {type: constraint}
        dictionary_component_item:
            data:
                - description: >
                      A ((component_item)) can be a dictionary of length 1.
                - requirement: {type: constraint}
            component_key:
                data:
                    - description: >
                          The key for a ((dictionary_component_item)) relates to
                          the ((component_type)).
                    - requirement: {type: constraint}
                value_ancestor:
                    - description: >
                          The ((component_key)) maps to one and only one
                          ((component_type)). Either the ((component_key)) is
                          itself the ((component_type)) or is
                          "{component_type} of".
                    - requirement: {type: constraint}
            component_value:
                data:
                    - description: >
                          The ((component_value)) contains the data for the
                          component.
                    - requirement: {type: constraint}
                scalar_component_value:
                    data:
                        - description: >
                              How the ((scalar_component_value)) is interpreted
                              depends on the ((component_type)).
                        - requirement: {type: constraint}
                    value_ancestor:
                        - description: >
                              When the ((component_type)) has ((value)) as an
                              ancestor then the scalar gives the value for
                              ((value.value)), i.e. the "value" field.
                        - requirement: {type: constraint}
                    relation_ancestor:
                        value_is_target:
                            - description: >
                                  When the ((component_type)) has ((relation)) as
                                  an ancestor and the ((component_key)) is equal
                                  to a ((component_type)), then the scalar gives
                                  the value for ((relation.target)), i.e. the
                                  "target" field.
                            - requirement: {type: constraint}
                        value_is_source:
                            - description: >
                                  When the ((component_type)) has ((relation)) as
                                  an ancestor and the ((component_key)) has the
                                  format "{component_type} of", then the scalar
                                  gives the value for ((relation.source)), i.e.
                                  the "source" field.
                            - requirement: {type: constraint}
                dictionary_component_value:
                    standard_case:
                        - description: >
                              If the ((component_value)) is a dictionary, then each
                              key in the dictionary corresponds to a column in the
                              ((component_schema)) of the ((component_type)) specified
                              by the ((component_key)).
                    schema_case:
                        - description: >
                              The exception to the above rule about
                              ((dictionary_component_value)) is when
                              ((component_type)) has ((schema)) as an ancestor.
                              In such a case, the dictionary defines the schema,
                              with a key per column.
