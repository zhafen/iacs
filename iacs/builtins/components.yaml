file_info:
    - description: >
          This file contains the key entities that define and describe how
          iacs works.
    - file_info

component:
    data:
        - description: >
              Fundamental component type used throughout the iacs system.
              Children of ((component)) are themselves component definitions.
    tag:
        - alias: tag
        - description: >
              A tag has no data. It simply indicates that the entity owns a component
              of a given type.
    value:
        - alias: value
        - description: >
              A component that is a single value of arbitrary type.
        - field:
              value:
                  description: The value itself.
    relation:
        data:
            - alias: relation
            - description: >
                  A component that describes a relation between two entities: the owner
                  entity and the entity specified by value.
            - field:
                  value:
                      description: The other end of the relation.
                      type: entity_ref
        directed_relation:
            data:
                - alias: directed_relation
                - description: >
                      A relation where direction matters. The owner entity is the source
                      and the entity specified by value is the target.
            parent:
                - description: The target entity is the parent of the source entity.
                - field:
                      is_primary:
                          description: Whether this is the primary parent defining the entity's position in the hierarchy.
                          type: bool
                          default: false

base_data_type:
    data:
        - description: >
              A ((data_type)) component is a ((value)) component with additional
              specifications.
        - parent: value
    int:
        - alias: int
        - description: Integer data type.
    float:
        - alias: float
        - description: Float data type.
    str:
        data:
            - alias: str
            - description: String data type.
        entity_id:
            data:
                - alias: entity_id
                - description: Data type for entity IDs.
            component_type:
                - alias: component_type
                - description: >
                      The component_type data type means the value must point to
                      an entity with a [component_definition] component.
                - component_type:
                      skip_on_export: true
                - field:
                      derived:
                          description: >
                              Whether this component type is derived (computed from other
                              components, not sourced directly from YAML). Derived component
                              types are excluded from manifest export.
                          type: bool
                          default: false
                      skip_on_export:
                          description: >
                              Whether this component type should be excluded from
                              manifest export. Used for internal registry tables not
                              sourced directly from YAML.
                          type: bool
                          default: false
                - todo: >
                      Component definitions inherit the type for the value field from
                      their parents, but we also allow users to define the type of value
                      field using a field component. This means there's room for
                      inconsistency.
        categorical:
            - alias: categorical
            - description: Data type for a limited set of categories.
        entity_ref:
            - alias: entity_ref
            - description: >
                  A user-provided string that references an entity by providing a
                  partial or full path. Resolved to an entity_id by substring
                  matching against the entity's full path.
    timestamp:
        - description: Timestamp data type.
        - field:
              value:
                  description: The value of the timestamp as a string, float, or int.
              timezone:
                  description: The timezone.
                  type: str
                  default: UTC
              format:
                  description: How to interpret the value.
                  type: str
                  default: str
                  range: [str, epoch_time]
    timedelta:
        - description: >
              Data type for differences in time. I
        - field:
              value:
                  description: >
                      The value of the timedelta as a string, float, or int. If a string
                      such as "2 days" then the timedelta is unresolved, and must be
                      converted prior to usage in calculations.
              unit:
                  description: Unit for the timedelta.
                  type: str
    rating:
        - description: >
              A qualitative rating whose interpretation depends on the type field.
              Integers are assumed to be 0_to_10, floats 0_to_1, and strings
              low_med_high when type is inferred.
        - field:
              value:
                  description: The rating value; an integer, float, or string.
              type:
                  description: >
                      The rating scale. "0_to_10" is an integer 0–10 scale, "0_to_1"
                      is a float 0–1 scale, "low_med_high" is a categorical scale, and
                      "inferred" derives the scale from the value's Python type.
                  type: str
                  range: [0_to_10, 0_to_1, low_med_high, inferred]
                  default: inferred

data_structure:
    data:
        - parent: value
    list:
        - description: List data type.
    dict:
        - description: Dictionary data type.
    field:
        - description: >
              A component that specifies the constraints on a data field. Used to define
              the schema for components.
        - parent: dict
        - field:
              value:
                  description: The name of the field.
                  type: str
              description:
                  description: A text description of the field.
                  type: str
              type:
                  description: The type of the field.
                  type: str
              nullable:
                  description: Whether or not nulls can exist in the field.
                  type: bool
                  default: true
              unique:
                  description: Whether or not there should be only unique values.
                  type: bool
                  default: false
              default:
                  description: The default value for the field.
              range:
                  description: >
                      A data structure specifying the allowed values for the field. If a
                      list, then the type should be categorical or a child of that type.
              units:
                  description: >
                      Units used for the field, if they exist.
                  type: str
              time_dimension:
                  description: >
                    Whether or not this field is a time dimension, for use in slowly
                    changing dimensions.
                  type: bool
                  default: false
                  nullable: false
        - todo: >
              We are going to track derived vs source at a schema level, but we can also
              record this at a field level.
        - todo: >
              We should check if we are modifying any columns in-place anywhere, other
              than filling in null values, and stop that.
    schema:
        - description: >
              A list of ((field)) components that defines the columns in a component
              table.
        - parent: list
        - field:
              value:
                  description: A list of ((field)) components.
                  type: list[field]
        - todo: >
              Do we have dueling definitions here? On one hand we have individual field
              components that are part of the entity. On the other hand schema
              component holds a list of field components.
    table:
        - description: >
              Tabular data type. From a row-first perspective tables are lists of
              dictionaries of fields. From a column-first perspective tables are
              dictionaries of lists of fields.
        - parent: dict
        - field:
              value:
                  description: The data itself.
              schema:
                  description: The ordered fields for the table columns.
                  type: schema

iacs_component:
    data:
        - description: Additional useful components defined by iacs.
        - parent: value

    description:
        - description: >
              A human-readable description of what an entity is or does. This is one of
              the most common components as nearly every entity should have a description.
        - parent: str
        - field:
              value:
                  description: The descriptive text.
                  type: str
    entity_id:
        - description: >
              The ((entity_id)) component contains identity information about a given
              entity.
        - parent: value
        - component_type:
              skip_on_export: true
        - field:
              value:
                  description: >
                      The entity_id.
                  type: str
              path:
                  description: >
                      The full path to the entity, in the format {filepath}:{yaml_path}.
                  type: str
              hash:
                  description: >
                      Hash of the path, used for ID when brief.
                      TODO: Do we actually need this? It was supposed to be a readable
                      version of the path, but it's far from readable.
                  type: str
              alias:
                  description: >
                      A readable version of the entity_id.
                  type: str
    same_as:
        - description: >
              Declares that the owner entity is the same underlying entity as
              the one referenced by ((same_as)).value (or, exactly, by
              ((same_as)).target_entity_id) — an entity already present in the
              registry being updated into. All of the owner's other component
              data is rebased onto that entity's identity instead of minting a
              new, disconnected one. This is the standard way to target an
              existing entity when updating the registry, e.g. an SCD-style
              position update. Resolved during derive by
              iacs.dataflows.derive.resolve_same_as, which runs before all
              other derive steps.
        - parent: relation
        - component_type:
              skip_on_export: true
        - field:
              value:
                  description: >
                      Path (or partial path) to the existing entity this one
                      is the same as, resolved by substring matching like any
                      entity_ref. Ignored if target_entity_id is given.
                  type: entity_ref
              target_entity_id:
                  description: >
                      Exact entity_id hash of the existing entity, for when
                      the path is ambiguous or unknown. Takes precedence over
                      value when given. Named target_entity_id (not
                      entity_id) so it doesn't collide with the component
                      table's own entity_id meta column.
                  type: entity_id
                  nullable: true
    impact:
        data:
            - description: >
                  Quantifies the positive impact or benefit associated with an entity.
                  Serves as the common ancestor for impact-related scoring components,
                  suited for agile prioritization frameworks (e.g. RICE, ICE, WSJF).
                  The name "value" was considered for this role but avoided because
                  "value" has a specific existing meaning in iacs as the single-field
                  base component type.
            - parent: value
            - field:
                  value:
                      description: >
                          Impact score, with higher values corresponding to greater impact.
                      type: rating
                      default: 0.5
                  type:
                      description: The type of impact.
                      type: str
                      default: impact
                  conversion:
                      description: Count of units of subtype impact per normalized impact.
                      type: float
                      default: 1
        requirement:
            - description: >
                  Indicates that an entity represents a requirement that must be satisfied
                  by the system design. Requirements should be traced to implementations.
            - parent: impact
            - field:
                  type:
                      description: The type of requirement.
                      type: str
                      range:
                          - functional
                          - quality
                          - constraint
                      default: functional
                  value:
                      description: >
                          The priority/impact score for the requirement, with higher
                          values corresponding to higher priority.
                      type: rating
                      default: 0.5
                  schedule:
                      description: >
                          How often the requirement needs to be satisfied. If null, the
                          requirement needs to be satisfied on demand.
                      type: timedelta
                      default: null

    impact_budget:
        - description: >
              Quantifies the budget (allotment) and conversion rate for a specific type of
              impact.  When an impact_budget component is not defined for an impact type
              the conversion is 1 and the budget is null, aka unlimited.
        - field:
              value:
                  description: The impact type this budget is associated with.
                  type: str
                  nullable: false
              normalized_value_per_unit:
                  description: >
                    Normalized units of impact per one unit of this impact type.
                  type: float
                  default: 1
              budget:
                  description:
                      Units of impact type until significantly diminishing returns. Null
                      means no limit.
                  type: float
              description:
                  description:
                      Information about the impact type and the corresponding
                      budget.
                  type: str

    solution:
        - description: >
              A solution relation is used to show a requirement is fulfilled.
              The ((solution.source)) solves the ((solution)).requirement.
        - parent: directed_relation
        - field:
              value:
                  description: The entity that this solution targets (what is being solved).
                  type: entity_ref

    cost:
        data:
            - description: >
                  Quantifies the cost or resource expenditure associated with an entity.
                  Serves as the common ancestor for cost-related components, suited
                  for agile prioritization frameworks (e.g. RICE, WSJF). Paired with
                  ((impact)) to enable impact-effort analyses.
            - parent: value
            - field:
                  value:
                      description: Cost magnitude, with higher values corresponding to greater cost.
                      type: float
                  type:
                      description:
                          The type of cost. Examples include time effort, story
                          points, and US dollars.
                      type: str
                      default: cost
                  schedule:
                      description: >
                          How often the cost needs to be paid, i.e. the maintenance
                          cost. Null indicates a one-time effort.
                      type: timedelta
                      default: null
    cost_budget:
        - description: >
              Quantifies the budget and conversion rate for a specific type of cost.
              When a cost_budget component is not defined for a cost type the conversion
              is 1 and the budget is null, aka unlimited.
        - field:
              value:
                  description: The cost type this budget is associated with.
                  type: str
                  nullable: false
              normalized_value_per_unit:
                  description: >
                    Normalized units of cost per one unit of this cost type.
                  type: float
                  default: 1
              budget:
                  description: Units of cost type available to spend. Null means no limit.
                  type: float
              description:
                  description:
                      Information about the cost type and the corresponding
                      budget.
                  type: str
    task:
        - description: >
              Indicates that an entity represents a task that needs to be completed,
              either by a human or by automated infrastructure.
              To create a repeatable task to execute, create an entity that
              inherits from ((task)).
              To create an instance of a task, including start time, execution_state,
              etc., add a component instance of ((task)) to an entity.
        - parent: value
        - field:
              start:
                  description: Time the task was started at.
                  type: timestamp
              end:
                  description: Time the task ended.
                  type: timestamp
              execution_state:
                  description: State of the task in execution.
                  default: not started
                  type: str
                  range:
                      - not started
                      - in progress
                      - complete
              result_state:
                  description: Outcome state of the task.
                  type: str
                  range:
                      - success
                      - failure
                      - interrupted
              executor:
                  description: The entity responsible for executing the task.
                  type: entity_id

    work_state:
        - description: >
              The status of an entity, in terms of implementation.
        - parent: value
        - field:
              value:
                  description: A string indicating the status of the entity.
                  type: str
                  range:
                      - new
                      - in progress
                      - in review
                      - blocked
                      - done
                      - removed
                  nullable: false

    todo:
        - description: >
              Indicates something about the entity that needs to be addressed or completed.
              Used to track pending work items.
        - parent: value
        - field:
              value:
                  description: Description of what needs to be done.
                  type: str
              priority:
                  description: >
                      The priority, with higher values corresponding to higher priority.
                  type: float
                  default: 0.5
                  range: [0, 1]

    audit:
        data:
            - description: >
                  Component types produced by iacs audit dataflows. Each audit dataflow
                  stores its result as a component table in the registry. An empty result
                  table indicates the audit passed with no findings.
        requirement_coverage:
            - description: >
                  Output of the requirement coverage audit. One row per requirement entity,
                  showing which solution covers it and that solution's work state. A null
                  solution_eid indicates the requirement has no covering solution.
                  Generate with: run_dataflow('audit.requirement_coverage').
            - field:
                  solution_eid:
                      description: >
                          Entity ID of the solution that covers this requirement, if any.
                      type: entity_id
                      nullable: true
                  solution_status:
                      description: >
                          The work_state of the covering solution, or null if uncovered.
                      type: str
                      range:
                          - new
                          - in progress
                          - in review
                          - blocked
                          - done
                          - removed
                      nullable: true
        traceability:
            - description: >
                  Output of the traceability audit. One row per entity that does not trace
                  to any requirement. An empty table means all entities are fully traceable.
                  Generate with: run_dataflow('audit.traceability').
            - field:
                  message:
                      description: >
                          Diagnostic message indicating the entity does not trace to any requirement.
                      type: str
        todo:
            - description: >
                  Output of the todo audit. One row per entity with an outstanding todo item.
                  An empty table means no todos remain.
                  Generate with: run_dataflow('audit.todo').
            - field:
                  value:
                      description: Description of what needs to be done.
                      type: str
        invalid_field:
            - description: >
                  Records field constraint violations from schema validation.
                  Generated by the validation pipeline.
            - component_type:
                  skip_on_export: true

    derived_field:
        - description: >
              Field definitions with parent inheritance resolved. Internal
              ETL table used for schema validation and entity_ref resolution.
        - component_type:
              skip_on_export: true

    entity_depth:
        - description: >
              Depth of an entity in the parent hierarchy. Derived from the parent
              component by iacs.dataflows.etl.derive_components.
        - component_type:
              derived: true

    effort_total:
        - description: >
              Total effort for an entity and all its descendants over a configured
              time period. Derived from effort components by
              iacs.dataflows.etl.derive_components.
        - component_type:
              derived: true

    priority_product:
        - description: >
              Product of requirement priorities for an entity and its requirement
              ancestors. Derived from requirement components by
              iacs.dataflows.etl.derive_components.
        - component_type:
              derived: true

    resolved_impact_cost:
        - description: >
              Normalized impact and cost totals (plus their diff and ratio) for
              an entity, weighted by the matching impact_budget/cost_budget
              normalized_value_per_unit. Derived from impact and cost components
              by iacs.dataflows.derive.impact_cost.
        - component_type:
              derived: true
