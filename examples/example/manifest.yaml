make_cats_happy:
    data:
        - description: The mission of our cat-happiness device.
        - requirement:
            priority: 1
    feed_and_water_cats:
        data:
            - description: Obviously.
            - requirement:
                priority: 1
        feed_cats:
            - requirement
            - alias: feed_cats
        water_cats:
            - requirement
            - alias: water_cats
    sift_cat_box:
        - description: Unfortunately.
        - requirement:
            priority: 0.8
    adore_cats:
        - description: Of course.
        - requirement

cat_happiness_device:
    data:
        - description: An all-in-one tool to make cats happy.
        - solution of: make_cats_happy
    feeding_system:
        data:
            - solution of: "make_cats_happy.feed_and_water_cats"
        feed_cats:
            - description: The task to feed the cats.
            - task
            - solution of: "make_cats_happy.feed_and_water_cats.feed_cats"
        water_cats:
            - description: The task to water the cats.
            - task
            - solution of: water_cats
    cleaning_system:
        - solution of: make_cats_happy.sift_cat_box
    adoring_system:
        - solution of: make_cats_happy.adore_cats

cat:
    - description: A data representation of a cat.
    - field:
        value: name
        description: The cat's name.
        type: str
        unique: True
    - field:
        value: breed
        description: The breed of the cat, e.g. orange.
        type: str