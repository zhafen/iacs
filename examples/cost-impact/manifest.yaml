impact_budgets:
    data:
        - description: >
              The allotments for types of [iacs_component.impact] components we use.
    general:
        - impact_budget:
            discovery:
                description: >
                    Time in hours spent experiencing something new. High value per unit
                    because it's often worth spending significant time to get out
                    something new, e.g. driving for 40 minutes round trip to try a new
                    cofee drink, an experience that might last as few as ten minutes.
                normalized_value_per_unit: 4
            enjoyment:
                description: >
                    Time in hours having a good time. Indicators include significant
                    investment, laughing, and overall, walking away with "that
                    was fun".
                normalized_value_per_unit: 1
            impulse:
                description: >
                    Time in hours doing something you have an inherent desire or
                    motivation to do. Notably distinct from enjoyment, etc.
                normalized_value_per_unit: 0.2
            pride:
                description: >
                    Time in hours doing something you're proud to do.
                normalized_value_per_unit: 1.5
            time_with_loved_ones:
                description: >
                    Time in hours spent actively doing something together with a loved
                    one. As a social interaction, there is often a social_interaction
                    cost associated with this.
                normalized_value_per_unit: 3
                budget: 7
    personal_value:
        - description: Impact budgets associated with personal values.
        - impact_budget:
              growth:
                  description: To keep changing and growing.
              accuracy:
                  description: To be accurate in my opinions and beliefs.
              rationality:
                  description: To be guided by reason and logic.
              purpose:
                  description: To have meaning and direction in my life.
              passion:
                  description: To have deep feelings about ideas, activities, or people.
              openness:
                  description: To be open to new experiences, ideas, and options.
              compassion:
                  description: To feel and act on concern for others.
              honesty:
                  description: To be earnest and truthful.
              responsibility:
                  description: To make and carry out responsible decisions.
              faithfulness:
                  description: To be in loyal and true relationships.

cost_budgets:
    - cost_budget:
            time_effort:
                description: >
                    Time spent in hours, at an intensity that has no limits other than
                    physical needs such as sleeping and eating.
                normalized_value_per_unit: 1
            grinding:
                description: >
                    Time spent in hours, with very low mental intensity. One indicator
                    of grinding is that you can multitask.
                normalized_value_per_unit: 0.5
            standard_problem_solving:
                description: >
                    Time spent in hours on a task that requires concentration.
                normalized_value_per_unit: 2
                budget: 6
            high_intensity_problem_solving:
                description: >
                    Time spent in hours on a task that requires full concentration.
                normalized_value_per_unit: 3
                budget: 4
            learning:
                description: >
                    Time spent in hours on a task that requires building new pathways
                    in the brain.
                normalized_value_per_unit: 4
                budget: 2
            inertia:
                description: >
                    Time spent in hours convincing oneself to do an activity and/or
                    setting the activity up.
                normalized_value_per_unit: 3
            social_interaction:
                description: Time spent in hours interacting with others.
                normalized_value_per_unit: 2
                budget: 7
            boredom:
                description: >
                    Time spent in hours doing something insufficiently stimulating.
                normalized_value_per_unit: 1.5
            stress:
                description: Time spent in hours facing mental stress.
                normalized_value_per_unit: 3
            physical_effort:
                description: >
                    Time spent in hours doing something that is physically straining.
                normalized_value_per_unit: 4
                budget: 2
            usd:
                description: US dollars cost type and budget.
                normalized_value_per_unit: 4 / 50

