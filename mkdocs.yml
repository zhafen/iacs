site_name: iacs
site_description: Infrastructure as Code Sketch
site_url: https://zhafen.github.io/iacs/
repo_url: https://github.com/zhafen/iacs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - API Reference: api/
  - Dataflow DAGs: dataflows/index.md
  - Visualizations: visualizations.md
