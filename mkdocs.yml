site_name: iacs
site_description: Infrastructure as Code Sketch
site_url: https://zhafen.github.io/iacs/
repo_url: https://github.com/zhafen/iacs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - API Reference:
    - iacs: api/iacs.md
    - registry: api/registry.md
    - architect: api/architect.md
    - utils: api/utils.md
    - dataflows:
      - load_manifest: api/dataflows/load_manifest.md
      - derive_components: api/dataflows/derive_components.md
      - validate_registry: api/dataflows/validate_registry.md
      - export_manifest: api/dataflows/export_manifest.md
      - base_etl: api/dataflows/base_etl.md
      - audit/requirement_coverage: api/dataflows/audit/requirement_coverage.md
      - audit/traceability: api/dataflows/audit/traceability.md
      - audit/todo: api/dataflows/audit/todo.md
    - views:
      - requirement_tree: api/views/requirement_tree.md
  - Dataflow DAGs: dataflows/index.md
  - Visualizations: visualizations.md
